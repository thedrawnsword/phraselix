<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phraselix — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06070a;--bg2:#0d0f14;--bg3:#13161e;
  --border:#1e2230;--border2:#2a2f42;
  --accent:#e8ff47;--accent2:#c8e000;
  --text:#eeeef5;--text2:#7a7f9a;--text3:#4a4f66;
  --red:#ff4757;--green:#2ed573;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(232,255,71,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,71,.025) 1px,transparent 1px);background-size:60px 60px;}
.cursor{position:fixed;width:8px;height:8px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(232,255,71,.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s;}
body{cursor:none;}
@media(hover:none),(max-width:600px){body{cursor:auto;}.cursor,.cursor-ring{display:none;}}

.container{position:relative;z-index:1;width:100%;max-width:420px;padding:2rem 1.5rem;}

.logo-wrap{text-align:center;margin-bottom:2.5rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:6px;color:var(--accent);text-decoration:none;opacity:.8;transition:opacity .2s;}
.logo:hover{opacity:1;}
.logo-sub{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-top:.3rem;}

.card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:2rem;}

.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:var(--text);margin-bottom:.3rem;}
.card-sub{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:1.8rem;}

.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.8rem;padding:.85rem 1.5rem;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:400;cursor:pointer;transition:all .15s;text-decoration:none;margin-bottom:1.5rem;}
.google-btn:hover{border-color:var(--text2);background:var(--bg);}
.google-icon{width:18px;height:18px;flex-shrink:0;}

.divider{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--text3);}

.field{margin-bottom:1.2rem;}
.field-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;}
.field-label::before{content:'//';color:var(--text3);}
input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:300;padding:.85rem 1.2rem;outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(232,255,71,.15);}
input::placeholder{color:var(--text3);}

.forgot{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);text-decoration:none;display:block;text-align:right;margin-top:.4rem;transition:color .2s;}
.forgot:hover{color:var(--accent);}

.submit-btn{width:100%;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;padding:.8rem 2rem;background:var(--accent);color:var(--bg);border:none;border-radius:4px;cursor:pointer;transition:all .15s;margin-top:1.5rem;position:relative;overflow:hidden;}
.submit-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:translateX(-100%);transition:transform .4s;}
.submit-btn:hover::after{transform:translateX(100%);}
.submit-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 30px rgba(232,255,71,.25);}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.error-msg{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--red);padding:.8rem 1rem;border:1px solid rgba(255,71,87,.2);border-radius:4px;background:rgba(255,71,87,.05);display:none;letter-spacing:1px;margin-top:1rem;}
.error-msg.show{display:block;}

.switch{text-align:center;margin-top:1.5rem;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);}
.switch a{color:var(--accent);text-decoration:none;transition:opacity .2s;}
.switch a:hover{opacity:.7;}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:var(--bg);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;padding:.6rem 1.4rem;border-radius:3px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:9999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="container">
  <div class="logo-wrap">
    <a class="logo" href="/">Phraselix</a>
    <div class="logo-sub">Content Tools</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome Back</div>
    <div class="card-sub">Sign in to your account</div>

    <a class="google-btn" href="#" onclick="googleSignIn()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>

    <div class="field">
      <div class="field-label">Email</div>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>

    <div class="field">
      <div class="field-label">Password</div>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <a class="forgot" href="#">Forgot password?</a>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="submit-btn" id="submitBtn" onclick="signIn()">Sign In</button>

    <div class="switch">Don't have an account? <a href="/signup">Sign up</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });

async function signIn() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');

  if (!email || !password) { showError('Please fill in all fields'); return; }
  hideError();
  btn.disabled = true;
  btn.textContent = 'Signing In...';

  try {
    const res = await fetch('/api/auth/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Something went wrong'); return; }
    localStorage.setItem('phraselix_token', data.token);
    localStorage.setItem('phraselix_user', JSON.stringify(data.user));
    showToast('Welcome back ' + data.user.name + '!');
    setTimeout(() => window.location.href = '/', 1000);
  } catch (e) {
    showError('Something went wrong — try again');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function googleSignIn() {
  showToast('Google Sign-In coming soon!');
}

function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('show'); }
function hideError() { document.getElementById('errorMsg').classList.remove('show'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

// Check if already logged in
if (localStorage.getItem('phraselix_token')) window.location.href = '/';

const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.left=mx+'px'; cursor.style.top=my+'px'; });
function animRing(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); }
animRing();
document.querySelectorAll('a,button,input').forEach(el => {
  el.addEventListener('mouseenter', () => { ring.style.width='48px'; ring.style.height='48px'; ring.style.borderColor='rgba(232,255,71,.6)'; });
  el.addEventListener('mouseleave', () => { ring.style.width='32px'; ring.style.height='32px'; ring.style.borderColor='rgba(232,255,71,.3)'; });
});
</script>
</body>
</html>
